<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Druckverlust Pro – Freigabeentscheidungs-QS</title>
  <style>body{font:16px/1.5 system-ui;margin:2rem;color:#071c35}li{margin:.45rem 0}.ok{color:#08783e}.error{color:#b42318}</style>
</head>
<body>
  <h1>Phase 21.08 – Freigabeentscheidungs-QS</h1>
  <p id="summary">Prüfung läuft …</p>
  <ol id="results"></ol>
  <script type="module">
    import { runReleaseDecisionTests } from './phase21-release-decision.test.js';
    const report = runReleaseDecisionTests();
    document.querySelector('#summary').textContent = `${report.counts.passed} von ${report.counts.total} Prüfungen bestanden.`;
    document.querySelector('#summary').className = report.passed ? 'ok' : 'error';
    document.querySelector('#results').innerHTML = report.checks.map(item => `<li class="${item.passed ? 'ok' : 'error'}">${item.passed ? '✓' : '✗'} ${item.label}${item.error ? ` – ${item.error}` : ''}</li>`).join('');
  </script>
</body>
</html>
