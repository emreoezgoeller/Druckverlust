<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phase 21.10 – Beta-Feedback-Test</title>
  <style>body{font-family:system-ui;margin:2rem;background:#f4f8fc;color:#071c35}pre{padding:1rem;background:#fff;border-radius:12px;white-space:pre-wrap}</style>
</head>
<body>
  <h1>Phase 21.10 – Beta-Feedback-Test</h1>
  <pre id="result">Test läuft …</pre>
  <script type="module">
    import {
      createBetaFeedbackDraft,
      createBetaFeedbackJson,
      formatBetaFeedback,
      parseBetaFeedbackJson,
      validateBetaFeedbackDraft,
    } from '../src/testing/BetaFeedbackReport.js?v=21.11';

    const checks = [];
    const add = (ok, text) => checks.push(`${ok ? '✓' : '✗'} ${text}`);
    const draft = createBetaFeedbackDraft({
      reporter: { name: 'Browser-Test', role: 'QS' },
      issue: {
        category: 'report', severity: 'medium', title: 'PDF-Test',
        description: 'Bericht wird geprüft.', steps: 'Bericht öffnen.',
        actual: 'Vorschau sichtbar.', expected: 'Vorschau sichtbar.',
      },
    });
    const validation = validateBetaFeedbackDraft(draft);
    add(validation.valid, 'Meldung gültig');
    add(validation.complete, 'Meldung vollständig');
    const json = createBetaFeedbackJson(draft);
    add(parseBetaFeedbackJson(json).issue.title === 'PDF-Test', 'JSON-Roundtrip');
    add(formatBetaFeedback(draft).includes('nicht automatisch versendet'), 'Datenschutz-Hinweis');
    document.getElementById('result').textContent = `${checks.join('\n')}\n\n${checks.filter(x => x.startsWith('✓')).length}/${checks.length} bestanden`;
  </script>
</body>
</html>
