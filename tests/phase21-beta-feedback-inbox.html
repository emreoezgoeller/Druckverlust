<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phase 21.11 – Beta-Feedback-Auswertung</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:0;background:#eef5fb;color:#071c35}
    main{max-width:980px;margin:40px auto;padding:24px;background:#fff;border-radius:22px;box-shadow:0 18px 50px rgba(7,28,53,.1)}
    .ok{color:#087c59}.error{color:#a11f2d}pre{white-space:pre-wrap;background:#071c35;color:#dff4ff;padding:18px;border-radius:14px}
  </style>
</head>
<body>
  <main>
    <span>Phase 21.11</span>
    <h1>Beta-Feedback-Auswertung</h1>
    <p id="status">Prüfung läuft …</p>
    <pre id="output"></pre>
  </main>
  <script type="module">
    import { createBetaFeedbackDraft } from '../src/testing/BetaFeedbackReport.js';
    import { createBetaFeedbackInbox, serializeBetaFeedbackInbox, deserializeBetaFeedbackInbox } from '../src/testing/BetaFeedbackInbox.js';
    const drafts = [
      createBetaFeedbackDraft({ id:'a', issue:{severity:'blocker',title:'Blocker',description:'Test',steps:'1',actual:'A',expected:'B'} }),
      createBetaFeedbackDraft({ id:'b', issue:{category:'idea',severity:'suggestion',title:'Idee',description:'Test',steps:'1',actual:'A',expected:'B'} }),
    ];
    try {
      const inbox = createBetaFeedbackInbox(drafts.map(draft => ({draft})));
      const restored = deserializeBetaFeedbackInbox(serializeBetaFeedbackInbox(inbox.entries));
      if (inbox.counts.total !== 2 || inbox.status !== 'blocked' || restored.length !== 2) throw new Error('Unerwartetes Testergebnis.');
      document.querySelector('#status').textContent = 'Bestanden: Import, Priorisierung und Speicher-Roundtrip.';
      document.querySelector('#status').className = 'ok';
      document.querySelector('#output').textContent = JSON.stringify(inbox.counts, null, 2);
    } catch (error) {
      document.querySelector('#status').textContent = `Fehler: ${error.message}`;
      document.querySelector('#status').className = 'error';
    }
  </script>
</body>
</html>
