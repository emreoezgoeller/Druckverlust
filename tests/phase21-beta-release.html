<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Druckverlust Pro – Beta-Freigabestand-QS</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:0;background:#071c35;color:#eef7ff}.wrap{max-width:960px;margin:40px auto;padding:24px}.card{background:#fff;color:#10263e;border-radius:18px;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.22)}h1{margin-top:0}.ok{color:#087a52}.bad{color:#b42318}li{margin:.5rem 0}
  </style>
</head>
<body>
  <main class="wrap"><section class="card"><h1>Beta-Freigabestand-QS</h1><p id="summary">Prüfung läuft …</p><ul id="checks"></ul></section></main>
  <script type="module">
    import { runBetaReleaseTests } from './phase21-beta-release.test.js';
    const result = runBetaReleaseTests();
    const summary = document.getElementById('summary');
    summary.className = result.passed ? 'ok' : 'bad';
    summary.textContent = `${result.counts.passed} von ${result.counts.total} Einzelprüfungen bestanden.`;
    document.getElementById('checks').innerHTML = result.checks.map(item => `<li class="${item.passed ? 'ok' : 'bad'}">${item.passed ? '✓' : '✗'} ${item.label}${item.error ? ` – ${item.error}` : ''}</li>`).join('');
  </script>
</body>
</html>
