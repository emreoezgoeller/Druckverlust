<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>TEST – SelectionEngine</title>
</head>
<body>
  <h1>SelectionEngine Referenztest</h1>
  <pre id="output"></pre>

  <script type="module">
    import SelectionEngine from '../../src/ui/core/SelectionEngine.js';

    const output = document.getElementById('output');
    const selection = new SelectionEngine();

    let notified = false;

    selection.subscribe((currentSelection) => {
      notified = true;
      output.textContent += 'Auswahl geändert:\n';
      output.textContent += JSON.stringify(currentSelection, null, 2) + '\n\n';
    });

    selection.select('section', 'TS1', {
      name: 'TS1',
      airVolume: 900
    });

    const current = selection.getSelection();

    if (
      current.type === 'section' &&
      current.id === 'TS1' &&
      current.data.airVolume === 900 &&
      notified === true
    ) {
      output.textContent += '✅ TEST BESTANDEN';
    } else {
      output.textContent += '❌ TEST FEHLGESCHLAGEN';
    }
  </script>
</body>
</html>
