<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><title>Druckverlust Pro – CalculationEngine Test</title></head>
<body>
<pre id="out">Tests werden ausgeführt...</pre>
<script type="module">
import { CalculationEngine } from '../../src/core/CalculationEngine.js';
const section = { type:'duct', q:900, b:0.45, h:0.45, l:1.25, zetaSum:0.33 };
const result = CalculationEngine.calculateSection(section, { rho:1.21, lambda:0.025 });
const ok = result.area > 0 && result.velocity > 0 && result.totalLoss > 0;
document.getElementById('out').textContent = ok
  ? 'TEST OK – CalculationEngine rechnet.'
  : 'TEST FEHLER – CalculationEngine prüfen.';
</script>
</body>
</html>
