<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>TEST – RibbonActions</title>
</head>
<body>
  <h1>RibbonActions Referenztest</h1>
  <pre id="output"></pre>

  <script type="module">
    import ApplicationState from '../../src/app/ApplicationState.js';
    import RibbonActions from '../../src/ui/core/RibbonActions.js';

    const output = document.getElementById('output');

    window.alert = (message) => {
      output.textContent += message + '\n';
    };

    const state = new ApplicationState();
    const actions = new RibbonActions(state);

    actions.newProject();
    actions.openProject();
    actions.saveProject();
    actions.addSection();
    actions.addFormPart();
    actions.calculate();
    actions.exportPdf();

    output.textContent += '\n✅ TEST BESTANDEN';
  </script>
</body>
</html>
