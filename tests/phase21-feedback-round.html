<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 21.07 – Fachtest-Runden-QS</title>
  <style>body{font:16px system-ui;margin:2rem;max-width:1000px}li{margin:.45rem 0}.ok{color:#087443}.error{color:#b42318}</style>
</head>
<body>
  <h1>Phase 21.07 – Fachtest-Runden-QS</h1>
  <p id="summary">Test läuft …</p>
  <ol id="results"></ol>
  <script type="module">
    import { runFeedbackRoundTests } from './phase21-feedback-round.test.js';
    const report = runFeedbackRoundTests();
    document.querySelector('#summary').textContent = `${report.label}: ${report.summary}`;
    document.querySelector('#results').innerHTML = report.checks.map(item => `<li class="${item.passed ? 'ok' : 'error'}">${item.passed ? '✓' : '✗'} ${item.label}</li>`).join('');
  </script>
</body>
</html>
